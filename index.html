<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Khoa An</title>

<style>
/* ===== WELCOME ANIME UI ===== */
#welcomeOverlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, rgba(0,255,255,.15), #000);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  animation:fadeIn .8s ease;
}

.welcomeBox{
  text-align:center;
  padding:40px 30px;
  border-radius:20px;
  background:rgba(0,40,60,.7);
  border:1px solid rgba(0,255,255,.3);
  box-shadow:0 0 40px rgba(0,255,255,.4);
  animation:animePop .6s ease;
}

.welcomeBox h2{
  margin:0 0 10px;
  color:#00ffff;
  text-shadow:0 0 15px #00ffff;
}

.welcomeBox p{
  color:#ccc;
  margin-bottom:20px;
}

.welcomeBox button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#00ffff,#00cfff);
  box-shadow:0 0 20px #00ffff;
  transition:.3s;
}

.welcomeBox button:hover{
  transform:scale(1.08);
  box-shadow:0 0 30px #00ffff;
}

@keyframes animePop{
  from{transform:scale(.7) translateY(40px); opacity:0}
  to{transform:scale(1); opacity:1}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* Avatar rung nhẹ */
.avatar:hover{
  animation:shake .4s ease;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-2px)}
  50%{transform:translateX(2px)}
  75%{transform:translateX(-2px)}
  100%{transform:translateX(0)}
}
</style>
</head>

<body>

<!-- ===== POPUP ===== -->
<div id="welcomeOverlay">
  <div class="welcomeBox">
    <h2>✨ Xin chào Khoa An ✨</h2>
    <p>Chào mừng đến với bio của coder 😎</p>
    <button id="enterBtn">🚀 Bắt đầu</button>
  </div>
</div>

<!-- ===== NỘI DUNG CŨ CỦA BẠN ===== -->
<h1 style="text-align:center;color:white;margin-top:100px">
  WEB CỦA KHOA AN 😎
</h1>

<audio id="backgroundAudio" loop>
  <source src="https://files.catbox.moe/rp5kuq.mp3">
</audio>

<script>
// ===== MUSIC =====
const audio = document.getElementById("backgroundAudio");

function playMusic(){
  audio.play().catch(()=>{});
}

// ===== POPUP =====
const overlay = document.getElementById("welcomeOverlay");
const btn = document.getElementById("enterBtn");

btn.onclick = () => {
  overlay.style.opacity = "0";
  overlay.style.transform = "scale(1.1)";
  setTimeout(()=> overlay.style.display = "none", 400);

  playMusic(); // fix iPhone
};
</script>

</body>
</html>
